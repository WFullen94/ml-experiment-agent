name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with eval extra — pulls agent-eval from GitHub)
        run: pip install -e ".[dev,eval]"
      - name: Unit tests
        run: pytest -q
      - name: Evaluate the real agent with agent-eval
        run: python -m eval.run_eval
